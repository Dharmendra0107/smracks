name: 🚀 Deploy SMRacks to Hostinger

on:
  push:
    branches:
      - main

concurrency:
  group: smracks-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔑 Configure SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.SMRACKS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -p ${{ secrets.SMRACKS_PORT }} -H ${{ secrets.SMRACKS_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=yes \
            -p ${{ secrets.SMRACKS_PORT }} \
            ${{ secrets.SMRACKS_USERNAME }}@${{ secrets.SMRACKS_HOST }} << 'EOF'

          set -e

          cd ${{ secrets.SMRACKS_APP_PATH }}

          echo "📥 Pulling latest code..."
          git fetch origin
          git reset --hard origin/main

          echo "📦 Installing Composer dependencies..."
          composer install \
            --no-dev \
            --no-interaction \
            --prefer-dist \
            --optimize-autoloader

          echo "🗄️ Running migrations..."
          php artisan migrate --force

          echo "🧹 Clearing caches..."
          php artisan optimize:clear

          echo "⚙️ Rebuilding caches..."
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

          echo "🔗 Storage Link..."
          php artisan storage:link || true

          echo "🔒 Permissions..."
          chmod -R 775 storage bootstrap/cache

          echo "✅ Deployment Successful"

          EOF