name: 🚀 Deploy SMRacks to Hostinger

on:
  push:
    branches:
      - main

concurrency:
  group: smracks-production
  cancel-in-progress: true

jobs:
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔑 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SMRACKS_SSH_KEY }}

      - name: 📡 Add Host to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SMRACKS_PORT }} -H ${{ secrets.SMRACKS_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy Application
        run: |
          ssh -p ${{ secrets.SMRACKS_PORT }} \
          ${{ secrets.SMRACKS_USERNAME }}@${{ secrets.SMRACKS_HOST }} << 'EOF'

          set -e

          cd ${{ secrets.SMRACKS_APP_PATH }}

          echo "📥 Pulling latest code..."
          git fetch origin
          git reset --hard origin/main

          echo "📦 Installing Composer dependencies..."
          composer install \
              --no-dev \
              --no-interaction \
              --prefer-dist \
              --optimize-autoloader

          echo "🗄️ Running database migrations..."
          php artisan migrate --force

          echo "🧹 Clearing caches..."
          php artisan optimize:clear

          echo "⚙️ Rebuilding caches..."
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

          echo "🔗 Creating storage link..."
          php artisan storage:link || true

          echo "🔒 Setting permissions..."
          chmod -R 775 storage bootstrap/cache

          echo "✅ Deployment completed successfully."

          EOF